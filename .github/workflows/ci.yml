name: ci

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      gguf_path:
        description: "Runner-local path to the PocketDM Q4_K_M GGUF"
        required: false
        type: string

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: python -m pip install uv
      - name: Run unit tests
        run: uv run --group dev pytest -q
      - name: Optional 50-session grammar gate
        env:
          DISPATCH_GGUF: ${{ github.event.inputs.gguf_path }}
          POCKETDM_CI_GGUF: ${{ vars.POCKETDM_CI_GGUF }}
        run: |
          MODEL="${DISPATCH_GGUF:-$POCKETDM_CI_GGUF}"
          if [ -z "$MODEL" ]; then
            echo "POCKETDM_CI_GGUF/gguf_path not set; skipping GGUF session gate."
            exit 0
          fi
          uv run --group dev --group eval python -m eval.sessions \
            --model "$MODEL" \
            --sessions 50 \
            --threads 4 \
            --progress \
            --require-clean \
            --out eval/results/ci-grammar-sessions.json
