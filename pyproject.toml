[project]
name = "pocketdm"
version = "0.1.0"
description = "PocketDM offline adventure engine"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2",
]

[dependency-groups]
dev = [
    "pytest>=8",
]

[tool.uv]
package = false

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = [
    "tests",
]
